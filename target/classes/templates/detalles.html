<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="'Literalura - ' + ${libro.titulo}">Detalles del Libro</title>
</head>
<body>
    <main>
        <div class="glass-card mb-5" th:if="${libro != null}">
            <div class="row g-5 align-items-center">
                
                <!-- Book Image -->
                <div class="col-md-4 text-center">
                    <img th:src="${libro.imagen}" th:alt="${libro.titulo}" class="img-fluid rounded shadow-lg" onerror="this.src='/img/No-disponible-libro.jpg';" style="max-height: 500px; object-fit: cover;">
                </div>
                
                <!-- Book Info -->
                <div class="col-md-8">
                    <h1 class="display-4 fw-bold mb-3" th:text="${libro.titulo}"></h1>
                    
                    <div class="mb-4">
                        <span class="badge bg-primary fs-6 me-2"><i class="fa-solid fa-language me-1"></i> <span th:text="${libro.lenguaje}"></span></span>
                        <span class="badge bg-info text-dark fs-6 me-2"><i class="fa-solid fa-tag me-1"></i> <span th:text="${libro.categoria}"></span></span>
                        <span class="badge bg-secondary fs-6"><i class="fa-solid fa-download me-1"></i> <span th:text="${libro.cantidadDescargas}"></span> descargas</span>
                    </div>
                    
                    <div class="mb-4 d-flex flex-wrap gap-2" th:if="${libro.vibras != null and !libro.vibras.isEmpty()}">
                        <a th:each="vibra : ${libro.vibras}" th:href="@{/libros/listar(vibra=${vibra})}" class="badge rounded-pill bg-dark border border-info text-info fs-6 fw-normal px-3 py-2 text-decoration-none shadow-sm vibra-tag" th:text="'#' + ${vibra}"></a>
                    </div>

                    <h3 class="mb-3 border-bottom border-secondary pb-2">Sobre los Autores</h3>
                    <div class="row g-3 mb-4">
                        <div class="col-sm-6" th:each="autor : ${libro.autores}">
                            <div class="glass-panel p-3">
                                <h5 class="text-white mb-1" th:text="${autor.nombreFormateado}"></h5>
                                <small class="text-secondary d-block mb-3">
                                    <i class="fa-solid fa-calendar-days me-1"></i> 
                                    <span th:text="${autor.anioNac} ?: 'Desconocido'"></span> - <span th:text="${autor.anioMuerte} ?: 'Presente'"></span>
                                </small>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/libros/listar(nombreAutor=${autor.nombre})}" class="btn btn-sm btn-outline-info rounded-pill">
                                        <i class="fa-solid fa-book"></i> Sus Libros
                                    </a>
                                    <a th:href="'https://es.wikipedia.org/wiki/Special:Search?search=' + ${autor.nombreFormateado}" target="_blank" class="btn btn-sm btn-outline-light rounded-pill">
                                        <i class="fa-brands fa-wikipedia-w"></i> Biografía
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Magic Summary Box -->
                    <div class="glass-panel p-4 mb-4 border border-info border-opacity-25" id="resumenBox">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                            <div>
                                <h3 class="m-0 d-flex align-items-center">
                                    <i class="fa-solid fa-wand-magic-sparkles text-info me-2"></i>
                                    Resumen Mágico
                                    <span class="badge bg-info text-dark ms-3 rounded-pill" style="font-size: 0.6rem; letter-spacing: 1px;">IA</span>
                                </h3>
                                <p class="text-secondary mb-0 mt-1" style="font-size: 0.85rem;">
                                    Descubre de qué trata el libro con nuestro Bibliotecario Virtual.
                                </p>
                            </div>
                            <div>
                                <!-- Si NO hay resumen -->
                                <button th:if="${libro.resumen == null}" id="btnGenerarResumen" class="btn btn-sm btn-info rounded-pill" th:onclick="|generarResumen(${libro.id}, false)|">
                                    Generar con IA
                                </button>
                                
                                <!-- Si YA hay resumen -->
                                <div th:if="${libro.resumen != null}">
                                    <button class="btn btn-sm btn-outline-info rounded-pill" type="button" data-bs-toggle="modal" data-bs-target="#resumenModal">
                                        <i class="fa-solid fa-eye me-1"></i> Ver Resumen
                                    </button>
                                    <button id="btnRegenerarResumen" class="btn btn-sm btn-outline-warning rounded-pill ms-2" th:onclick="|generarResumen(${libro.id}, true)|" title="Volver a preguntarle a la IA">
                                        <i class="fa-solid fa-arrows-rotate"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>


                    <!-- Downloads / Formatos -->
                    <h3 class="mb-3 border-bottom border-secondary pb-2">Formatos Disponibles</h3>
                    <div class="d-flex flex-wrap gap-3">
                        <div th:each="entry : ${formatos}">
                            <a th:href="${entry.value}" target="_blank" class="btn btn-outline-light d-flex align-items-center gap-2">
                                <i class="fa-solid fa-file-pdf text-danger" th:if="${entry.key == 'application/pdf'}"></i>
                                <i class="fa-brands fa-html5 text-warning" th:if="${entry.key == 'text/html'}"></i>
                                <i class="fa-solid fa-file-audio text-info" th:if="${entry.key == 'audio/mp4'}"></i>
                                <i class="fa-solid fa-book-open text-primary" th:if="${entry.key == 'application/epub+zip'}"></i>
                                <i class="fa-solid fa-file-arrow-down text-success" th:if="${entry.key == 'application/octet-stream'}"></i>
                                <span th:text="${@utilidades.getFormatLabel(entry.key)}"></span>
                            </a>
                        </div>
                        <div th:if="${formatos == null || formatos.isEmpty()}" class="text-secondary">
                            <p><i class="fa-solid fa-circle-exclamation me-2"></i> No hay formatos de descarga disponibles.</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-5 text-center">
                <a href="javascript:history.back()" class="btn-modern bg-transparent border border-secondary text-white"><i class="fa-solid fa-arrow-left me-2"></i> Volver Atrás</a>
            </div>
        </div>
        
        <div th:if="${libro == null}" class="glass-card text-center py-5">
            <h2 class="text-danger">Libro no encontrado</h2>
            <a href="/" class="btn-modern mt-3">Ir al Inicio</a>
        </div>

        <!-- Modal Superpuesto con Fondo Oscuro (Movido a la raíz para evitar bugs de scroll) -->
        <div class="modal fade" id="resumenModal" tabindex="-1" aria-labelledby="resumenModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
                <div class="modal-content border-info" style="background-color: rgba(10, 25, 35, 0.95); backdrop-filter: blur(20px); border-radius: 16px; box-shadow: 0 0 30px rgba(0,0,0,0.8);">
                    <div class="modal-header border-bottom border-secondary">
                        <h5 class="modal-title text-info" id="resumenModalLabel"><i class="fa-solid fa-wand-magic-sparkles me-2"></i>Resumen Mágico</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body text-light fs-5 lh-lg" id="textoResumenInner">
                        <p class="text-secondary mb-0" th:if="${libro.resumen == null}">
                            Aún no hay magia aquí.
                        </p>
                        <p class="mb-0" th:if="${libro.resumen != null}" th:text="${libro.resumen}"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
