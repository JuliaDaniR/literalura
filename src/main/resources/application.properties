spring.application.name=literalura
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

# Ajuste de niveles de registro de Hibernate
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicExtractor=ERROR

# Configuracion de Thymeleaf
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
busqueda.enCurso=true
busqueda.cantidadResultado=0
busqueda.cantidadResultadoParcial=0
busqueda.tipoBusqueda=""

# Habilitar Virtual Threads de Java 21 para escalabilidad masiva y asincronía
spring.threads.virtual.enabled=true

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# OpenRouter (Modelos Gratuitos con mayor cuota)
openrouter.api-key=${OPENROUTER_API_KEY:mock-key-for-tests}
openrouter.url=https://openrouter.ai/api/v1/chat/completions
openrouter.models=poolside/laguna-xs.2:free,nvidia/nemotron-3-nano-30b-a3b:free,deepseek/deepseek-r1:free,openrouter/auto

# Google Gemini (Modelos Confiables)
gemini.base-url=https://generativelanguage.googleapis.com
gemini.api-key=${GEMINI_API_KEY:mock-key-for-tests}
gemini.models=gemini-3.5-flash,gemini-3.1-pro,gemini-3.1-flash-lite,gemini-3-flash,gemini-2.0-flash,gemini-2.0-flash-lite
