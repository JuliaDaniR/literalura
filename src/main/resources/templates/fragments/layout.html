<!DOCTYPE html>
<html th:fragment="layout(title, mainContent)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta tags SEO -->
    <meta name="description" content="Literalura - Explora, busca y descarga libros de forma profesional.">
    <title th:replace="${title}">Literalura</title>
    
    <!-- Favicon SVG vectorial -->
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}" />
    
    <!-- Bootstrap and Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Modern CSS -->
    <link rel="stylesheet" type="text/css" th:href="@{/css/modern-styles.css(v=2.0)}" />
</head>
<body>

    <!-- Header & Navbar Fragment -->
    <header th:replace="~{fragments/header :: header}"></header>

    <!-- Main Content injected here -->
    <main class="container my-5" style="flex: 1;">
        <div th:replace="${mainContent}"></div>
    </main>

    <!-- Footer Fragment -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Modal de Filtros Glassmorphism (Reubicado aquí para evitar bug de z-index) -->
    <div class="modal fade" id="filtrosModal" tabindex="-1" aria-labelledby="filtrosModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content glass-panel">
                <div class="modal-header border-bottom-0">
                    <h4 class="modal-title text-white" id="filtrosModalLabel">Búsqueda Avanzada</h4>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="filtrosFormLibro" method="get" th:action="@{/libros/listar}">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="text-secondary small mb-1">Buscar por Título</label>
                                <input type="text" class="modern-input" name="nombre" placeholder="Ej. Don Quijote">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-secondary small mb-1">Buscar por Autor</label>
                                <input type="text" class="modern-input" name="nombreAutor" placeholder="Ej. Cervantes">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="text-secondary small mb-1"><i class="fa-solid fa-wand-magic-sparkles text-info"></i> Buscar por Vibra / Sentimiento</label>
                                <input type="text" class="modern-input" name="vibra" placeholder="Ej. Misterio Gótico, Romance Trágico, Épico">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="text-secondary small mb-1">Idioma</label>
                                <select class="modern-input" name="idioma">
                                    <option value="">Cualquier idioma</option>
                                    <option value="ESPANOL">Español</option>
                                    <option value="INGLES">Inglés</option>
                                    <option value="FRANCES">Francés</option>
                                    <option value="PORTUGUES">Portugués</option>
                                    <option value="ALEMAN">Alemán</option>
                                    <option value="ITALIANO">Italiano</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-secondary small mb-1">Categoría</label>
                                <select class="modern-input" name="tipoCategoria">
                                    <option value="">Todas las categorías</option>
                                    <option value="FICCION">Ficción</option>
                                    <option value="FANTASIA">Fantasía</option>
                                    <option value="MISTERIO">Misterio</option>
                                    <option value="THRILLER">Thriller</option>
                                    <option value="ROMANCE">Romance</option>
                                    <option value="BIOGRAFIA">Biografía</option>
                                    <option value="AUTOBIOGRAFIA">Autobiografía</option>
                                    <option value="HISTORIA">Historia</option>
                                    <option value="CIENCIA">Ciencia</option>
                                    <option value="TECNOLOGIA">Tecnología</option>
                                    <option value="FILOSOFIA">Filosofía</option>
                                    <option value="PSICOLOGIA">Psicología</option>
                                    <option value="ARTE">Arte</option>
                                    <option value="MUSICA">Música</option>
                                    <option value="POESIA">Poesía</option>
                                    <option value="DRAMA">Drama</option>
                                    <option value="NEGOCIOS">Negocios</option>
                                    <option value="ECONOMIA">Economía</option>
                                    <option value="POLITICA">Política</option>
                                    <option value="RELIGION">Religión</option>
                                    <option value="AUTOAYUDA">Autoayuda</option>
                                    <option value="SALUD">Salud</option>
                                    <option value="DEPORTES">Deportes</option>
                                    <option value="VIAJES">Viajes</option>
                                    <option value="COCINA">Cocina</option>
                                    <option value="INFANTIL">Infantil</option>
                                    <option value="JUVENIL">Juvenil</option>
                                    <option value="EDUCATIVO">Educativo</option>
                                    <option value="AVENTURA">Aventura</option>
                                    <option value="HUMOR">Humor</option>
                                    <option value="MEDICINA">Medicina</option>
                                    <option value="DERECHO">Derecho</option>
                                    <option value="OTRO">Otro</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <h5 class="text-white mt-3 mb-2">Filtros Rápidos</h5>
                                <div class="d-flex flex-wrap gap-2">
                                    <div>
                                        <input type="checkbox" id="checkPopulares" name="masPopulares" value="true" class="filter-checkbox">
                                        <label for="checkPopulares" class="filter-label"><i class="fa-solid fa-fire me-1"></i> Top 100 Populares</label>
                                    </div>
                                    <div>
                                        <input type="checkbox" id="checkFavoritos" name="librosFavoritos" value="true" class="filter-checkbox">
                                        <label for="checkFavoritos" class="filter-label"><i class="fa-solid fa-heart me-1"></i> Mis Favoritos</label>
                                    </div>
                                    <div>
                                        <input type="checkbox" id="checkGuardados" name="librosGuardados" value="true" class="filter-checkbox">
                                        <label for="checkGuardados" class="filter-label"><i class="fa-solid fa-bookmark me-1"></i> Guardados</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4 text-end">
                            <button type="reset" class="btn btn-link text-secondary text-decoration-none me-2">Limpiar</button>
                            <button type="submit" class="btn-modern">Buscar Libros</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        function toggleFavorito(libroId, btnElement) {
            fetch(`/libros/favorito/${libroId}`, {
                method: 'POST'
            }).then(response => {
                if (response.ok) {
                    const icon = btnElement.querySelector('i.fa-star');
                    if (icon.classList.contains('fa-regular')) {
                        icon.classList.remove('fa-regular');
                        icon.classList.add('fa-solid', 'text-warning');
                    } else {
                        icon.classList.remove('fa-solid', 'text-warning');
                        icon.classList.add('fa-regular');
                    }
                } else {
                    console.error('Error al actualizar el favorito');
                }
            });
        }
                function generarResumen(libroId, recrear = false) {
            const btnGenerar = document.getElementById('btnGenerarResumen');
            const btnRegenerar = document.getElementById('btnRegenerarResumen');
            
            const modalElement = document.getElementById('resumenModal');
            const innerText = document.getElementById('textoResumenInner');
            
            // Forzar mostrar el modal superpuesto
            if (modalElement) {
                let myModal = bootstrap.Modal.getInstance(modalElement);
                if (!myModal) {
                    myModal = new bootstrap.Modal(modalElement);
                }
                myModal.show();
            }
            
            // Estado de carga
            if (btnGenerar) {
                btnGenerar.disabled = true;
                btnGenerar.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Pensando...';
            }
            if (btnRegenerar) {
                btnRegenerar.disabled = true;
                btnRegenerar.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            }
            
            innerText.innerHTML = '<p class="text-secondary mb-0"><i class="fa-solid fa-wand-magic-sparkles fa-bounce me-2"></i>Consultando a los antiguos sabios digitales...</p>';

            // Añadir el parámetro de forzar regeneración
            fetch(`/libros/resumen/${libroId}?recrear=${recrear}`, { method: 'POST' })
                .then(response => response.text())
                .then(texto => {
                    innerText.innerHTML = `<div class="mb-0">${texto}</div>`;
                    if (btnGenerar) btnGenerar.innerHTML = '<i class="fa-solid fa-check"></i> Generado';
                    if (btnRegenerar) {
                        btnRegenerar.disabled = false;
                        btnRegenerar.innerHTML = '<i class="fa-solid fa-arrows-rotate"></i>';
                    }
                    
                    // Pequeño truco visual: Actualizamos los botones dinámicamente sin recargar la página
                    if (btnGenerar && !recrear) {
                        const container = btnGenerar.parentElement;
                        container.innerHTML = `
                            <button class="btn btn-sm btn-outline-info rounded-pill" type="button" data-bs-toggle="modal" data-bs-target="#resumenModal">
                                <i class="fa-solid fa-eye me-1"></i> Ver Resumen
                            </button>
                            <button id="btnRegenerarResumen" class="btn btn-sm btn-outline-warning rounded-pill ms-2" onclick="generarResumen(${libroId}, true)" title="Volver a preguntarle a la IA">
                                <i class="fa-solid fa-arrows-rotate"></i>
                            </button>
                        `;
                    }
                })
                .catch(error => {
                    innerText.innerHTML = '<p class="text-danger mb-0">Hubo un cortocircuito mágico.</p>';
                    if (btnGenerar) {
                        btnGenerar.disabled = false;
                        btnGenerar.innerHTML = 'Reintentar';
                    }
                    if (btnRegenerar) {
                        btnRegenerar.disabled = false;
                        btnRegenerar.innerHTML = '<i class="fa-solid fa-arrows-rotate"></i>';
                    }
                });
        }

        // Chatbot Logic
        document.addEventListener('DOMContentLoaded', function() {
            const chatToggle = document.getElementById('chatbotToggleBtn');
            const chatWindow = document.getElementById('chatbotWindow');
            const chatClose = document.getElementById('chatbotCloseBtn');
            const chatInput = document.getElementById('chatbotInput');
            const chatSendBtn = document.getElementById('chatbotSendBtn');
            const chatBody = document.getElementById('chatbotBody');

            if (!chatToggle) return;

            function toggleChat() {
                chatWindow.classList.toggle('show');
                if (chatWindow.classList.contains('show')) {
                    chatInput.focus();
                }
            }

            chatToggle.addEventListener('click', toggleChat);
            chatClose.addEventListener('click', toggleChat);

            chatInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    enviarMensajeChat();
                }
            });
            chatSendBtn.addEventListener('click', enviarMensajeChat);

            function enviarMensajeChat() {
                const mensaje = chatInput.value.trim();
                if (!mensaje) return;

                // Añadir burbuja del usuario
                addChatBubble(mensaje, 'user');
                chatInput.value = '';

                // Mostrar estado "pensando"
                const thinkingId = 'thinking-' + Date.now();
                addChatBubble('<i class="fa-solid fa-ellipsis fa-fade text-info fs-4"></i>', 'bot', thinkingId, true);

                // Enviar a la API
                fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje: mensaje })
                })
                .then(response => response.json())
                .then(data => {
                    // Remover estado pensando
                    const thinkingBubble = document.getElementById(thinkingId);
                    if (thinkingBubble) thinkingBubble.remove();

                    // Añadir respuesta de texto
                    if (data.mensaje) {
                        addChatBubble(data.mensaje, 'bot');
                    }

                    // Añadir tarjetas de libros si hay
                    if (data.libros && data.libros.length > 0) {
                        let booksHtml = '<div class="mt-2">';
                        data.libros.forEach(libro => {
                            let autor = libro.autores && libro.autores.length > 0 ? libro.autores[0].nombreFormateado : 'Desconocido';
                            booksHtml += `
                                <a href="/libros/detalles/${libro.id}" class="book-card-mini">
                                    <img src="${libro.imagen || '/img/No-disponible-libro.jpg'}" alt="Portada">
                                    <div class="info">
                                        <p class="title text-truncate">${libro.titulo}</p>
                                        <p class="author text-truncate">${autor}</p>
                                    </div>
                                    <i class="fa-solid fa-chevron-right text-info"></i>
                                </a>
                            `;
                        });
                        booksHtml += '</div>';
                        addChatBubble(booksHtml, 'bot', null, true);
                    }
                })
                .catch(error => {
                    const thinkingBubble = document.getElementById(thinkingId);
                    if (thinkingBubble) thinkingBubble.remove();
                    addChatBubble('Lo siento, mi varita se quedó sin batería o hubo un error mágico. Intenta de nuevo más tarde.', 'bot');
                    console.error(error);
                });
            }

            function addChatBubble(content, sender, id = null, isHtml = false) {
                const div = document.createElement('div');
                div.className = `chat-bubble ${sender}`;
                if (id) div.id = id;
                if (isHtml) {
                    div.innerHTML = content;
                    if (sender === 'bot' && content.includes('book-card-mini')) {
                        div.style.background = 'transparent';
                        div.style.padding = '0';
                    }
                } else {
                    div.textContent = content;
                }
                chatBody.appendChild(div);
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        });

        // Polling para Estado de Múltiples Búsquedas en Curso
        document.addEventListener('DOMContentLoaded', function() {
            const toastContainer = document.getElementById('busquedaToastContainer');
            if (toastContainer && typeof bootstrap !== 'undefined') {
                const toastsState = {}; // Mapea id a su estado actual
                
                function pollEstadoBusqueda() {
                    fetch('/estadoBusqueda')
                        .then(response => response.json())
                        .then(busquedas => {
                            if (!Array.isArray(busquedas)) return;
                            
                            busquedas.forEach(data => {
                                let toastEl = document.getElementById('toast-' + data.id);
                                let isNew = false;
                                
                                if (!toastEl) {
                                    isNew = true;
                                    toastEl = document.createElement('div');
                                    toastEl.id = 'toast-' + data.id;
                                    toastEl.className = 'toast glass-panel border border-info border-opacity-50 shadow-lg mb-3';
                                    toastEl.setAttribute('role', 'alert');
                                    toastEl.setAttribute('aria-live', 'assertive');
                                    toastEl.setAttribute('aria-atomic', 'true');
                                    toastEl.setAttribute('data-bs-autohide', 'false');
                                    toastEl.style.borderRadius = '12px';
                                    toastEl.style.overflow = 'hidden';
                                    
                                    toastEl.innerHTML = `
                                        <div class="toast-header bg-dark text-white border-bottom border-info border-opacity-25 py-2">
                                            <strong class="me-auto fs-6 toast-title"></strong>
                                            <button type="button" class="btn btn-sm btn-link text-white p-0 me-3" data-bs-toggle="collapse" data-bs-target="#collapse-body-${data.id}" title="Minimizar">
                                                <i class="fa-solid fa-minus"></i>
                                            </button>
                                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close" title="Cerrar"></button>
                                        </div>
                                        <div id="collapse-body-${data.id}" class="collapse show">
                                            <div class="toast-body text-white p-3 toast-content"></div>
                                        </div>
                                    `;
                                    toastContainer.appendChild(toastEl);
                                    toastsState[data.id] = { wasInProgress: false, userClosed: false, bsToast: new bootstrap.Toast(toastEl) };
                                    
                                    // Evitar que se vuelva a abrir si el usuario lo cierra manualmente
                                    toastEl.addEventListener('hidden.bs.toast', () => {
                                        const currentState = toastsState[data.id];
                                        if (currentState && currentState.wasInProgress) {
                                            currentState.userClosed = true;
                                        }
                                    });
                                }
                                
                                const state = toastsState[data.id];
                                const titleEl = toastEl.querySelector('.toast-title');
                                const bodyEl = toastEl.querySelector('.toast-content');

                                if (data.busquedaEnCurso) {
                                    if (!toastEl.classList.contains('show') && !state.userClosed) {
                                        state.bsToast.show();
                                    }
                                    titleEl.innerHTML = '<i class="fa-solid fa-satellite-dish me-2 text-warning" style="animation: pulse 1s infinite"></i> Buscando...';
                                    bodyEl.innerHTML = '<div class="small text-info mb-2">' + data.tipoBusqueda.replace(/\\n/g, '<br>') + '</div>' + 
                                                          '<div class="d-flex align-items-center mb-1"><div class="spinner-border spinner-border-sm text-info me-2"></div> ' + 
                                                          'Descargando libros...</div>' +
                                                          '<div class="small text-light ms-4"><i class="fa-solid fa-book-open me-1 text-info"></i> ' + data.cantidadResultadosParcial + ' encontrados</div>';
                                    state.wasInProgress = true;
                                } else {
                                    if (state.wasInProgress) {
                                        let href = '/libros/listar';
                                        if (data.tipoBusqueda.includes('Nombre del libro:')) {
                                            href = '/libros/listar?nombre=' + encodeURIComponent(data.tipoBusqueda.split('Nombre del libro:')[1].trim());
                                        } else if (data.tipoBusqueda.includes('Libros más descargados')) {
                                            href = '/libros/listar?masPopulares=true';
                                        } else if (data.tipoBusqueda.includes('Lenguaje:')) {
                                            href = '/libros/listar?idioma=' + encodeURIComponent(data.tipoBusqueda.split('Lenguaje:')[1].trim());
                                        } else if (data.tipoBusqueda.includes('Palabra Clave:')) {
                                            href = '/libros/listar?palabraClave=' + encodeURIComponent(data.tipoBusqueda.split('Palabra Clave:')[1].trim());
                                        } else if (data.tipoBusqueda.includes('Categoria:')) {
                                            href = '/libros/listar?tipoCategoria=' + encodeURIComponent(data.tipoBusqueda.split('Categoria:')[1].trim());
                                        } else if (data.tipoBusqueda.includes('Vivos hasta')) {
                                            href = '/libros/listar?anio=' + encodeURIComponent(data.tipoBusqueda.split('Vivos hasta')[1].trim());
                                        }

                                        titleEl.innerHTML = '<i class="fa-solid fa-check-circle me-2 text-success"></i> ¡Finalizada!';
                                        bodyEl.innerHTML = '<div class="small text-info mb-2">' + data.tipoBusqueda.replace(/\\n/g, '<br>') + '</div>' + 
                                                              'Se guardaron <strong>' + data.cantidadResultados + '</strong> libros.<br>' +
                                                              '<a href="' + href + '" class="btn btn-sm btn-outline-info mt-3 w-100"><i class="fa-solid fa-eye me-1"></i> Ver Resultados</a>';
                                        state.wasInProgress = false;
                                        state.userClosed = false; // Resetear para forzar que vea el final
                                        
                                        // Forzar expansión si estaba minimizado
                                        let collapseEl = document.getElementById('collapse-body-' + data.id);
                                        if (collapseEl && !collapseEl.classList.contains('show')) {
                                            new bootstrap.Collapse(collapseEl, {toggle: false}).show();
                                        }
                                        
                                        if (!toastEl.classList.contains('show')) {
                                            state.bsToast.show();
                                        }
                                    }
                                }
                            });
                        })
                        .catch(err => console.debug("Polling estadoBusqueda:", err));
                }
                
                setInterval(pollEstadoBusqueda, 2000);
                pollEstadoBusqueda();
            }
        });
    </script>

    <!-- Chatbot UI HTML -->
    <button class="chatbot-btn" id="chatbotToggleBtn" title="Hablar con el Bibliotecario">
        <i class="fa-solid fa-hat-wizard"></i>
    </button>

    <div class="chat-window glass-panel" id="chatbotWindow">
        <div class="chat-header">
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-hat-wizard text-info fs-4 me-2"></i>
                <h6 class="mb-0 text-white fw-bold">Bibliotecario Mágico</h6>
            </div>
            <button type="button" class="btn-close btn-close-white" id="chatbotCloseBtn" aria-label="Close" style="font-size: 0.8rem;"></button>
        </div>
        <div class="chat-body" id="chatbotBody">
            <div class="chat-bubble bot">
                ¡Hola! Soy el guardián de Literalura. Dime qué te apetece leer o cómo te sientes hoy, y buscaré en mis estanterías mágicas para ti. ✨
            </div>
        </div>
        <div class="chat-footer">
            <input type="text" class="chat-input" id="chatbotInput" placeholder="Ej: Quiero terror clásico..." autocomplete="off">
            <button class="chat-send-btn" id="chatbotSendBtn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Toast Container para Múltiples Búsquedas en Curso -->
    <div class="toast-container position-fixed bottom-0 start-0 p-3" style="z-index: 1055;" id="busquedaToastContainer">
        <!-- Los Toasts se inyectan dinámicamente aquí -->
    </div>
</body>
</html>
